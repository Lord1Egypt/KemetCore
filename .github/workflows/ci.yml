name: kemetcore-ci

on:
  # Feature branches are validated via the pull_request event (one run); restricting
  # push to main avoids a duplicate concurrent run on every PR-branch push.
  push:
    branches: [main]
  pull_request:

jobs:
  golden-pymodel:
    name: Phase 0/1 tests (golden + pymodel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install numpy pytest
      - name: Run all project tests
        run: pytest projects/ -q

  rtl-cocotb:
    name: Phase 2 RTL (SHA-256 cocotb + Verilator)
    runs-on: ubuntu-24.04   # ships Verilator 5.x, matching local
    steps:
      - uses: actions/checkout@v4
      - name: Install Verilator + cocotb (same system Python)
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator python3-pip
          verilator --version
          # cocotb 1.9.x supports Verilator 5.020 (ubuntu-24.04); 2.x needs 5.036+
          # numpy: the HapiCore golden (hapi_fpu.py) uses it for IEEE-754 reference math
          pip3 install --break-system-packages 'cocotb==1.9.2' numpy
      - name: Run SHA-256 testbench
        run: ./projects/anubiscore/rtl/tb/run_sim.sh CORE=sha256
      - name: Run SHA3-256 testbench
        run: ./projects/anubiscore/rtl/tb/run_sim.sh CORE=sha3
      - name: Run SHA-512 testbench
        run: ./projects/anubiscore/rtl/tb/run_sim.sh CORE=sha512
      - name: Run SHA3-512 testbench
        run: ./projects/anubiscore/rtl/tb/run_sim.sh CORE=sha3_512
      - name: Run SHA3-384 testbench
        run: ./projects/anubiscore/rtl/tb/run_sim.sh CORE=sha3_384
      - name: Run SHA3-224 testbench
        run: ./projects/anubiscore/rtl/tb/run_sim.sh CORE=sha3_224
      - name: Run HMAC-SHA256 testbench
        run: ./projects/anubiscore/rtl/tb/run_sim.sh CORE=hmac
      - name: Run HMAC-SHA512 testbench
        run: ./projects/anubiscore/rtl/tb/run_sim.sh CORE=hmac512
      - name: Run SHAKE128 XOF testbench
        run: ./projects/anubiscore/rtl/tb/run_sim.sh CORE=shake128
      - name: Run SHAKE256 XOF testbench
        run: ./projects/anubiscore/rtl/tb/run_sim.sh CORE=shake256
      - name: Run SethCore ALU testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=alu
      - name: Run SethCore mul/div testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=muldiv
      - name: Run SethCore immediate-generator testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=imm
      - name: Run SethCore register-file testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=regfile
      - name: Run SethCore ALU-control testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=aluctl
      - name: Run SethCore decode/control testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=decode
      - name: Run SethCore CSR testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=csr
      - name: Run SethCore CSR bank testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=csru
      - name: Run SethCore branch testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=branch
      - name: Run SethCore LSU testbench
