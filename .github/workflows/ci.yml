  synth-yosys:
    name: Phase 3 synthesis (Yosys, 0-latch check)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Yosys
        run: sudo apt-get update && sudo apt-get install -y yosys
      - name: Synthesize AnubisCore (asserts no latches)
        run: YOSYS=yosys ./projects/anubiscore/synth/run_synth.sh
      - name: Synthesize SethCore ALU (asserts no latches)
        run: YOSYS=yosys ./projects/sethcore/synth/run_synth.sh
      - name: Synthesize HapiCore bf16 (asserts no latches)
        run: YOSYS=yosys ./projects/hapicore/synth/run_synth.sh
      - name: Synthesize NeithCore NTT primitives (asserts no latches)
        run: YOSYS=yosys ./projects/neithcore/synth/run_synth.sh
      - name: Synthesize BastCore MAC (asserts no latches)
        run: YOSYS=yosys ./projects/bastcore/synth/run_synth.sh
      - name: Synthesize GebCore sparse-MAC (asserts no latches)
        run: YOSYS=yosys ./projects/gebcore/synth/run_synth.sh
      - name: Synthesize AtumCore vector ALU (asserts no latches)
        run: YOSYS=yosys ./projects/atumcore/synth/run_synth.sh
      - name: Synthesize PtahConv fp32 MAC (asserts no latches)
        run: YOSYS=yosys ./projects/ptahconv/synth/run_synth.sh
      - name: Synthesize SobekCore fp32 dot3 (asserts no latches)
        run: YOSYS=yosys ./projects/sobekcore/synth/run_synth.sh
      - name: Synthesize RaCore KAI register block (asserts no latches)
        run: YOSYS=yosys ./projects/racore/synth/run_synth.sh
