name: kemetcore-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  golden-pymodel:
    name: Phase 0/1 tests (golden + pymodel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install numpy pytest
      - name: Run all project tests
        run: pytest projects/ -q

  rtl-cocotb:
    name: Phase 2 RTL (SHA-256 cocotb + Verilator)
    runs-on: ubuntu-24.04   # ships Verilator 5.x, matching local
    steps:
      - uses: actions/checkout@v4
      - name: Install Verilator + cocotb (same system Python)
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator python3-pip
          verilator --version
          # cocotb 1.9.x supports Verilator 5.020 (ubuntu-24.04); 2.x needs 5.036+
          # numpy: the HapiCore golden (hapi_fpu.py) uses it for IEEE-754 reference math
          pip3 install --break-system-packages 'cocotb==1.9.2' numpy
      - name: Run SHA-256 testbench
        run: ./projects/anubiscore/rtl/tb/run_sim.sh CORE=sha256
      - name: Run SHA3-256 testbench
        run: ./projects/anubiscore/rtl/tb/run_sim.sh CORE=sha3
      - name: Run SethCore ALU testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=alu
      - name: Run SethCore mul/div testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=muldiv
      - name: Run SethCore immediate-generator testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=imm
      - name: Run SethCore register-file testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=regfile
      - name: Run SethCore ALU-control testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=aluctl
      - name: Run SethCore decode/control testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=decode
      - name: Run SethCore integrated single-cycle core testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=core
      - name: Run SethCore 5-stage pipeline testbench
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=pipeline
      - name: Run SethCore forwarding-pipeline testbench (vs interlock + golden)
        run: ./projects/sethcore/rtl/tb/run_sim.sh CORE=fwd
      - name: Run HapiCore bf16 multiplier testbench
        run: ./projects/hapicore/rtl/tb/run_sim.sh CORE=mul
      - name: Run HapiCore bf16 adder testbench
        run: ./projects/hapicore/rtl/tb/run_sim.sh CORE=add
      - name: Run HapiCore fp32 multiplier testbench
        run: ./projects/hapicore/rtl/tb/run_sim.sh CORE=fp32mul
      - name: Run HapiCore fp32 adder testbench
        run: ./projects/hapicore/rtl/tb/run_sim.sh CORE=fp32add
      - name: Run HapiCore fp16 multiplier testbench
        run: ./projects/hapicore/rtl/tb/run_sim.sh CORE=fp16mul
      - name: Run HapiCore fp16 adder testbench
        run: ./projects/hapicore/rtl/tb/run_sim.sh CORE=fp16add
      - name: Run HapiCore bf16 FMA testbench
        run: ./projects/hapicore/rtl/tb/run_sim.sh CORE=bf16fma
      - name: Run HapiCore fp16 FMA testbench
        run: ./projects/hapicore/rtl/tb/run_sim.sh CORE=fp16fma
      - name: Run HapiCore fp32 FMA testbench
        run: ./projects/hapicore/rtl/tb/run_sim.sh CORE=fp32fma
      - name: Run HapiCore fp32 divider testbench
        run: ./projects/hapicore/rtl/tb/run_sim.sh CORE=fp32div
      - name: Run HapiCore fp32 sqrt testbench
        run: ./projects/hapicore/rtl/tb/run_sim.sh CORE=fp32sqrt
      - name: Run NeithCore modular multiplier testbench
        run: ./projects/neithcore/rtl/tb/run_sim.sh CORE=modmul
      - name: Run NeithCore NTT butterfly testbench
        run: ./projects/neithcore/rtl/tb/run_sim.sh CORE=butterfly
      - name: Run NeithCore 256-point NTT engine testbench
        run: ./projects/neithcore/rtl/tb/run_sim.sh CORE=ntt
      - name: Run BastCore MAC testbench
        run: ./projects/bastcore/rtl/tb/run_sim.sh CORE=mac
      - name: Run BastCore MAC grid (systolic array) testbench
        run: ./projects/bastcore/rtl/tb/run_sim.sh CORE=grid
      - name: Run GebCore 2:4 sparse-MAC testbench
        run: ./projects/gebcore/rtl/tb/run_sim.sh CORE=spmac
      - name: Run AtumCore vector integer ALU testbench
        run: ./projects/atumcore/rtl/tb/run_sim.sh CORE=valu
      - name: Run AtumCore fp32 vector lane testbench
        run: ./projects/atumcore/rtl/tb/run_sim.sh CORE=vfpu
      - name: Run AtumCore vector reduction testbench
        run: ./projects/atumcore/rtl/tb/run_sim.sh CORE=vredu
      - name: Run AtumCore integrated vector execute testbench
        run: ./projects/atumcore/rtl/tb/run_sim.sh CORE=vexec
      - name: Run AtumCore vector register file testbench
        run: ./projects/atumcore/rtl/tb/run_sim.sh CORE=vregfile
      - name: Run AtumCore vsetvl testbench
        run: ./projects/atumcore/rtl/tb/run_sim.sh CORE=vsetvl
      - name: Run AtumCore single-cycle vector core testbench
        run: ./projects/atumcore/rtl/tb/run_sim.sh CORE=vcore
      - name: Run AtumCore compare-to-mask testbench
        run: ./projects/atumcore/rtl/tb/run_sim.sh CORE=vmask
      - name: Run AtumCore mask logical testbench
        run: ./projects/atumcore/rtl/tb/run_sim.sh CORE=vmlogic
      - name: Run AtumCore mask reduction testbench
        run: ./projects/atumcore/rtl/tb/run_sim.sh CORE=vmpopc

  synth-yosys:
    name: Phase 3 synthesis (Yosys, 0-latch check)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Yosys
        run: sudo apt-get update && sudo apt-get install -y yosys
      - name: Synthesize AnubisCore (asserts no latches)
        run: YOSYS=yosys ./projects/anubiscore/synth/run_synth.sh
      - name: Synthesize SethCore ALU (asserts no latches)
        run: YOSYS=yosys ./projects/sethcore/synth/run_synth.sh
      - name: Synthesize HapiCore bf16 (asserts no latches)
        run: YOSYS=yosys ./projects/hapicore/synth/run_synth.sh
      - name: Synthesize NeithCore NTT primitives (asserts no latches)
        run: YOSYS=yosys ./projects/neithcore/synth/run_synth.sh
      - name: Synthesize BastCore MAC (asserts no latches)
        run: YOSYS=yosys ./projects/bastcore/synth/run_synth.sh
      - name: Synthesize GebCore sparse-MAC (asserts no latches)
        run: YOSYS=yosys ./projects/gebcore/synth/run_synth.sh
      - name: Synthesize AtumCore vector ALU (asserts no latches)
        run: YOSYS=yosys ./projects/atumcore/synth/run_synth.sh
